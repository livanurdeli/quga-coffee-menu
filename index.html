<!DOCTYPE html>
<html lang="tr" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuGa COFFEE | Menü</title>
  <meta name="description" content="QuGa COFFEE'nin tüm lezzetlerini keşfedin. Özel içecekler, smoothie'ler ve daha fazlası.">
  <link rel="stylesheet" href="app.css">
</head>

<body>
  <div class="app-shell">

    <!-- MOBILE SCREEN -->
    <div class="mobile-frame" id="app-view">

      <!-- STICKY HEADER -->
      <header>
        <div class="header-top">
          <div class="branding">
            <div class="logo-circle" style="background: transparent; box-shadow: none;">
              <img src="256c61ef-ed13-48c1-b684-1bd9c022a3b7.png" alt="QuGa COFFEE Logo"
                style="width: 44px; height: 44px; border-radius: 12px; object-fit: contain;">
            </div>
            <div class="brand-details">
              <h1 id="brand-name">QuGa COFFEE</h1>
              <span id="location-label">✦ Menü</span>
            </div>
          </div>

          <div class="header-actions">
            <!-- Language Toggle -->
            <button class="icon-btn" id="lang-toggle" aria-label="Dil Değiştir">
              <span id="lang-label">TR</span>
            </button>
            <!-- Theme Toggle -->
            <button class="icon-btn" id="theme-toggle" aria-label="Tema Değiştir">
              <svg id="theme-icon-dark" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Search & Filter Tags -->
        <div class="search-filter-row">
          <div class="search-bar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="menu-search" placeholder="Ürün veya kategori ara...">
          </div>
          <div class="filter-scroll">
            <button class="filter-pill" data-tag="popular" id="filter-popular">⭐ Popüler</button>
            <button class="filter-pill" data-tag="vegan" id="filter-vegan">🌱 Vegan</button>
            <button class="filter-pill" data-tag="gf" id="filter-gf">🌾 Glutensiz</button>
            <button class="filter-pill" data-tag="hot" id="filter-hot">🔥 Sıcak</button>
            <button class="filter-pill" data-tag="cold" id="filter-cold">❄️ Soğuk</button>
          </div>
        </div>
      </header>

      <!-- STICKY CATEGORY SLIDER -->
      <nav class="category-container" id="category-bar">
        <div class="category-scroll" id="categories-list">
          <!-- Populated dynamically via JS -->
        </div>
      </nav>

      <!-- WELCOME HERO BANNER -->
      <div class="welcome-hero" style="padding: 15px 20px 0 20px;">
        <img src="c365ce85-02cf-4708-bcb3-cc305e992cad.jpg" alt="QuGa COFFEE"
          style="width: 100%; height: 180px; object-fit: cover; border-radius: 16px; box-shadow: 0 8px 20px rgba(197, 155, 39, 0.15);">
      </div>

      <!-- DYNAMIC MENU BODY -->
      <main class="menu-section" id="menu-container">
        <!-- Populated dynamically via JS -->
      </main>

      <!-- FOOTER -->
      <footer class="app-footer">
        <span>© 2026 QuGa COFFEE</span>
      </footer>

      <!-- PRODUCT DETAIL MODAL -->
      <div class="modal-overlay" id="product-detail-modal">
        <div class="modal-sheet">
          <div class="modal-header">
            <span class="tag-mini" id="modal-category">Kategori</span>
            <button class="modal-close" id="btn-close-modal" aria-label="Kapat">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>

          <img class="modal-hero-img" id="modal-image" src="" alt="Ürün Detay Görseli">

          <div class="modal-title-row">
            <h2 id="modal-name">Ürün İsmi</h2>
            <div class="menu-price" id="modal-price">0 TL</div>
          </div>

          <p class="modal-desc" id="modal-desc">Ürün açıklaması burada yer alır.</p>

          <div class="modal-meta-row">
            <div class="modal-meta-item" id="modal-cal-row">
              <span id="lbl-calories">Kalori</span>: <strong id="modal-calories">0 kcal</strong>
            </div>
            <div class="modal-meta-item" id="modal-allergen-row">
              <span id="lbl-allergens">Alerjen</span>: <strong id="modal-allergens">—</strong>
            </div>
          </div>
        </div>
      </div>

    </div>
    <!-- /mobile-frame -->

  </div>

  <!-- LOAD SCRIPTS -->
  <script src="menu-data.js"></script>
  <script src="app.js"></script>
</body>

</html>
