<!DOCTYPE html>
<html lang="tr" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuGa COFFEE | Menü</title>
  <meta name="description" content="QuGa COFFEE'nin tüm lezzetlerini keşfedin.">
  <link rel="stylesheet" href="app.css">
</head>

<body>
  <div class="app-shell">
    <div class="mobile-frame" id="app-view">

      <!-- ══ STICKY HEADER ══════════════════════════════ -->
      <header>
        <div class="header-top">
          <div class="branding">
            <div class="logo-circle">
              <img src="256c61ef-ed13-48c1-b684-1bd9c022a3b7.png" alt="QuGa COFFEE Logo">
            </div>
            <div class="brand-details">
              <h1>QuGa COFFEE</h1>
              <span id="admin-status-label">✦ Menü</span>
            </div>
          </div>
          <div class="header-actions">
            <button class="icon-btn" id="lang-toggle" aria-label="Dil">
              <span id="lang-label">TR</span>
            </button>
            <button class="icon-btn" id="btn-admin-trigger" aria-label="Admin">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
            <button class="icon-btn" id="theme-toggle" aria-label="Tema">
              <svg id="theme-icon-dark" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="search-filter-row">
          <div class="search-bar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="menu-search" placeholder="Ürün veya kategori ara...">
          </div>
          <div class="filter-scroll">
            <button class="filter-pill" data-tag="popular" id="filter-popular">⭐ Popüler</button>
            <button class="filter-pill" data-tag="vegan"   id="filter-vegan">🌱 Vegan</button>
            <button class="filter-pill" data-tag="gf"      id="filter-gf">🌾 Glutensiz</button>
            <button class="filter-pill" data-tag="hot"     id="filter-hot">🔥 Sıcak</button>
            <button class="filter-pill" data-tag="cold"    id="filter-cold">❄️ Soğuk</button>
          </div>
        </div>
      </header>

      <!-- ══ CATEGORY BAR ══════════════════════════════ -->
      <nav class="category-container" id="category-bar">
        <div class="category-scroll" id="categories-list"></div>
      </nav>

      <!-- ══ HERO BANNER ════════════════════════════════ -->
      <div style="padding:15px 20px 0">
        <img src="c365ce85-02cf-4708-bcb3-cc305e992cad.jpg" alt="QuGa COFFEE"
          style="width:100%;height:180px;object-fit:cover;border-radius:16px;box-shadow:0 8px 20px rgba(197,155,39,0.15)">
      </div>

      <!-- ══ MENU BODY ══════════════════════════════════ -->
      <main class="menu-section" id="menu-container"></main>

      <!-- ══ FOOTER ═════════════════════════════════════ -->
      <footer class="app-footer">© 2026 QuGa COFFEE</footer>


      <!-- ════════════════════════════════════════════════
           PRODUCT DETAIL MODAL
           ════════════════════════════════════════════════ -->
      <div class="modal-overlay" id="product-detail-modal">
        <div class="modal-sheet">
          <div class="modal-header">
            <span class="tag-mini" id="modal-category"></span>
            <button class="modal-close" id="btn-close-modal">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <img class="modal-hero-img" id="modal-image" src="" alt="">
          <div class="modal-title-row">
            <h2 id="modal-name"></h2>
            <div class="menu-price" id="modal-price"></div>
          </div>
          <p class="modal-desc" id="modal-desc"></p>
          <div class="modal-meta-row">
            <div class="modal-meta-item"><span id="lbl-calories">Kalori</span>: <strong id="modal-calories"></strong></div>
            <div class="modal-meta-item"><span id="lbl-allergens">Alerjen</span>: <strong id="modal-allergens"></strong></div>
          </div>
        </div>
      </div>


      <!-- ════════════════════════════════════════════════
           ADMIN LOGIN MODAL
           ════════════════════════════════════════════════ -->
      <div class="modal-overlay" id="admin-login-modal">
        <div class="modal-sheet" style="max-height:55%">
          <div class="modal-header">
            <h2 class="admin-modal-title">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-amber)"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Admin Girişi
            </h2>
            <button class="modal-close" id="btn-close-admin-login">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="admin-form">
            <div class="admin-field">
              <label for="admin-username">Kullanıcı Adı</label>
              <input type="text" id="admin-username" placeholder="admin" autocomplete="off">
            </div>
            <div class="admin-field">
              <label for="admin-password">Şifre</label>
              <input type="password" id="admin-password" placeholder="••••••">
            </div>
            <div class="admin-error" id="admin-login-error">Hatalı kullanıcı adı veya şifre!</div>
            <button class="btn-admin-submit" id="btn-admin-login-submit">Giriş Yap</button>
          </div>
        </div>
      </div>


      <!-- ════════════════════════════════════════════════
           ADMIN PANEL (full-screen drawer)
           ════════════════════════════════════════════════ -->
      <div class="admin-panel-overlay" id="admin-panel">
        <div class="admin-panel-sheet">

          <div class="admin-panel-header">
            <div class="admin-header-left">
              <span class="admin-badge">ADMIN</span>
              <span class="admin-panel-title">Menü Yönetimi</span>
            </div>
            <button class="modal-close" id="btn-close-admin-panel">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <!-- Category filter tabs inside panel -->
          <div class="admin-cat-tabs" id="admin-cat-tabs"></div>

          <!-- Search inside admin panel -->
          <div class="admin-search-wrap">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="admin-search" placeholder="Ürün ara...">
          </div>

          <!-- Product grid -->
          <div class="admin-items-list" id="admin-items-list"></div>

          <div class="admin-panel-footer">
            <button class="btn-admin-logout" id="btn-admin-logout">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Çıkış
            </button>
            <button class="btn-admin-reset" id="btn-admin-reset">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
              Sıfırla
            </button>
          </div>
        </div>
      </div>


      <!-- ════════════════════════════════════════════════
           ADMIN ITEM EDIT MODAL (detailed)
           ════════════════════════════════════════════════ -->
      <div class="modal-overlay" id="admin-edit-modal">
        <div class="modal-sheet admin-edit-sheet">

          <div class="modal-header">
            <div>
              <div class="admin-edit-cat-label" id="admin-edit-cat-label"></div>
              <h2 class="admin-edit-product-name" id="admin-edit-product-name"></h2>
            </div>
            <button class="modal-close" id="btn-close-admin-edit">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <!-- ── IMAGE SECTION ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Ürün Görseli
            </div>

            <!-- Current image preview -->
            <div class="edit-img-preview-wrap" id="edit-img-preview-wrap">
              <img id="edit-img-preview" src="" alt="Önizleme">
              <div class="edit-img-overlay">
                <label for="edit-img-file" class="edit-img-change-btn">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Galерiden Seç
                </label>
              </div>
            </div>

            <!-- Hidden file input -->
            <input type="file" id="edit-img-file" accept="image/*" style="display:none">

            <!-- Or URL -->
            <div class="edit-img-url-row">
              <span class="or-divider">veya URL girin</span>
              <input type="url" id="edit-image-url" placeholder="https://örnek.com/resim.jpg">
            </div>
          </div>

          <!-- ── PRICE ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Fiyat
            </div>
            <div class="edit-price-row">
              <input type="number" id="edit-price" placeholder="0" min="0" step="1" class="edit-price-input">
              <span class="price-currency">TL</span>
            </div>
          </div>

          <!-- ── NAMES ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              Ürün Adı
            </div>
            <div class="edit-lang-tabs">
              <button class="edit-lang-tab active" data-lang="tr" id="name-tab-tr">TR</button>
              <button class="edit-lang-tab" data-lang="en" id="name-tab-en">EN</button>
            </div>
            <input type="text" id="edit-name-tr" placeholder="Türkçe ürün adı" class="edit-input" data-name-lang="tr">
            <input type="text" id="edit-name-en" placeholder="English product name" class="edit-input hidden" data-name-lang="en">
          </div>

          <!-- ── DESCRIPTIONS ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
              Açıklama
            </div>
            <div class="edit-lang-tabs">
              <button class="edit-lang-tab active" data-lang="tr" id="desc-tab-tr">TR</button>
              <button class="edit-lang-tab" data-lang="en" id="desc-tab-en">EN</button>
            </div>
            <textarea id="edit-desc-tr" placeholder="Türkçe açıklama" class="edit-textarea" rows="3" data-desc-lang="tr"></textarea>
            <textarea id="edit-desc-en" placeholder="English description" class="edit-textarea hidden" rows="3" data-desc-lang="en"></textarea>
          </div>

          <!-- ── SAVE ── -->
           <button class="btn-admin-save" id="btn-admin-edit-save">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Değişiklikleri Kaydet
          </button>

        </div>
      </div>

      <!-- ════════════════════════════════════════════════
           ADMIN ITEM ADD MODAL
           ════════════════════════════════════════════════ -->
      <div class="modal-overlay" id="admin-add-modal">
        <div class="modal-sheet admin-edit-sheet">

          <div class="modal-header">
            <div>
              <div class="admin-edit-cat-label">Yeni Ürün</div>
              <h2 class="admin-edit-product-name">Menüye Yeni Ürün Ekle</h2>
            </div>
            <button class="modal-close" id="btn-close-admin-add">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <!-- ── CATEGORY ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              Kategori
            </div>
            <select id="add-category" class="edit-input" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-primary); font-family: inherit;">
              <!-- Will be populated dynamically with JS -->
            </select>
          </div>

          <!-- ── IMAGE SECTION ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Ürün Görseli
            </div>

            <div class="edit-img-preview-wrap" id="add-img-preview-wrap">
              <img id="add-img-preview" src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500&auto=format&fit=crop&q=60" alt="Önizleme">
              <div class="edit-img-overlay">
                <label for="add-img-file" class="edit-img-change-btn">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Galeriden Seç
                </label>
              </div>
            </div>

            <input type="file" id="add-img-file" accept="image/*" style="display:none">

            <div class="edit-img-url-row">
              <span class="or-divider">veya URL girin</span>
              <input type="url" id="add-image-url" placeholder="https://örnek.com/resim.jpg">
            </div>
          </div>

          <!-- ── PRICE ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Fiyat
            </div>
            <div class="edit-price-row">
              <input type="number" id="add-price" placeholder="0" min="0" step="1" class="edit-price-input">
              <span class="price-currency">TL</span>
            </div>
          </div>

          <!-- ── NAMES ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              Ürün Adı
            </div>
            <div class="edit-lang-tabs">
              <button class="edit-lang-tab active" data-lang="tr" id="add-name-tab-tr">TR</button>
              <button class="edit-lang-tab" data-lang="en" id="add-name-tab-en">EN</button>
            </div>
            <input type="text" id="add-name-tr" placeholder="Türkçe ürün adı" class="edit-input" data-name-lang="tr">
            <input type="text" id="add-name-en" placeholder="English product name" class="edit-input hidden" data-name-lang="en">
          </div>

          <!-- ── DESCRIPTIONS ── -->
          <div class="edit-section">
            <div class="edit-section-title">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
              Açıklama
            </div>
            <div class="edit-lang-tabs">
              <button class="edit-lang-tab active" data-lang="tr" id="add-desc-tab-tr">TR</button>
              <button class="edit-lang-tab" data-lang="en" id="add-desc-tab-en">EN</button>
            </div>
            <textarea id="add-desc-tr" placeholder="Türkçe açıklama" class="edit-textarea" rows="3" data-desc-lang="tr"></textarea>
            <textarea id="add-desc-en" placeholder="English description" class="edit-textarea hidden" rows="3" data-desc-lang="en"></textarea>
          </div>

          <!-- ── SAVE ── -->
          <button class="btn-admin-save" id="btn-admin-add-save">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ürünü Ekle
          </button>

        </div>
      </div>

      <!-- Toast -->
      <div class="admin-toast" id="admin-toast"></div>

    </div><!-- /mobile-frame -->
  </div>

  <script src="menu-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
